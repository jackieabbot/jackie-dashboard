<!DOCTYPE html>
<html>
<head>
    <title>Jackie's Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; padding: 20px; background: #1a1a2e; color: #eee; }
        .card { background: #16213e; padding: 20px; margin: 10px 0; border-radius: 8px; }
        .ok { color: #4ade80; }
        .error { color: #f87171; }
        h1 { color: #e94560; }
    </style>
</head>
<body>
    <h1>🖥️ Jackie's System Dashboard</h1>
    <div class="card">
        <h2>System Status</h2>
        <div id="system">Loading...</div>
    </div>
    <div class="card">
        <h2>Recent Calls</h2>
        <div id="calls">Loading...</div>
    </div>
    <script>
        async function loadData() {
            try {
                const sysRes = await fetch('system.json');
                const sysData = await sysRes.json();
                document.getElementById('system').innerHTML = 
                    '<p>CPU: ' + sysData.cpu + '%</p>' +
                    '<p>Memory: ' + sysData.memory.percent + '%</p>' +
                    '<p>Temp: ' + sysData.temperature_c + '°C</p>' +
                    '<p>Gateway: <span class="' + (sysData.gateway === 'running' ? 'ok' : 'error') + '">' + sysData.gateway + '</span></p>' +
                    '<p>Tunnel: <span class="' + (sysData.tunnel === 'running' ? 'ok' : 'error') + '">' + sysData.tunnel + '</span></p>' +
                    '<p>Updated: ' + sysData.timestamp + '</p>';
                
                const callsRes = await fetch('calls.json');
                const callsData = await callsRes.json();
                if (callsData.length === 0) {
                    document.getElementById('calls').innerHTML = '<p>No calls recorded</p>';
                } else {
                    document.getElementById('calls').innerHTML = '<pre>' + JSON.stringify(callsData, null, 2) + '</pre>';
                }
            } catch(e) {
                document.getElementById('system').innerHTML = '<p class="error">Error: ' + e.message + '</p>';
            }
        }
        loadData();
    </script>
</body>
</html>
